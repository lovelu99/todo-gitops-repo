# argocd/apps/dev-backend.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lovelu99/todo-gitops-repo.git
    targetRevision: main
    path: overlays/dev/backend
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true