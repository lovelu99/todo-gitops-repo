# argocd/apps/prod-mysql.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-mysql
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lovelu99/todo-gitops-repo.git
    targetRevision: main
    path: overlays/prod/mysql
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: false                          # ← NEVER auto prune prod database!
      selfHeal: false                       # ← manual sync for prod