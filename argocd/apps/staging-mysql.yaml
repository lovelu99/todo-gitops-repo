# argocd/apps/staging-mysql.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-mysql
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lovelu99/todo-gitops-repo.git
    targetRevision: main
    path: overlays/staging/mysql
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: false                          # ← NEVER auto prune prod database!
      selfHeal: false                       # ← manual sync for prod