# overlays/staging/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: staging-ingress
  namespace: staging
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/group.name: stagging          # ← groups rules in one ALB
spec:
  ingressClassName: alb
  rules:
    - host: staging.web.lovelu.com                              # ← staging hostname
      http:
        paths:
          - path: /api                                 # ← specific first ✅
            pathType: Prefix
            backend:
              service:
                name: todo-backend-service
                port:
                  number: 80
          - path: /                                    # ← catch-all last ✅
            pathType: Prefix
            backend:
              service:
                name: todo-frontend-service
                port:
                  number: 80